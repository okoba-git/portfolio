<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAWA | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Poiret+One&display=swap"
        rel="stylesheet">
    <link rel=“icon” href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header id="top">

        <div class="c-humburger" id="humburger-btn">
            <div class="c-humburger__icon">
                <span class="c-humburger__span"></span>
            </div>
            <ul class="c-humburger__nav">
                <li class="c-gnav__li"><a href="index.html">Top</a></li>
                <li class="c-gnav__li"><a href="#about">About</a></li>
                <li class="c-gnav__li"><a href="#works">Works</a></li>
            </ul>
        </div>
        <nav class="c-header">
            <ul class="l-gnav l-wrapper">
                <li class="c-gnav__li"><a href="index.html">Top</a></li>
                <li class="c-gnav__li"><a href="#about">About</a></li>
                <li class="c-gnav__li"><a href="#works">Works</a></li>
            </ul>
        </nav>
        <div class="p-mv">
            <h1 class="p-name">SAWA</h1>
        </div>
    </header>
    <main class="l-container">
        <section class="l-wrapper l-about-section" id="about">
            <h2 class="c-section-title">About</h2>
            <div class="l-profile">
                <h3 class="c-sub-title">profile</h3>
                <p class="u-center-text p-profile-text">
                    オペレーターとして勤務していた際、システムのUIに疑問を持ったことをきっかけにウェブ業界へ興味を持ちました。<br>2025年11月より翌年4月末まで、創造社リカレントスクール福岡校にてウェブ制作スキルを学習中です。<br>技術を身に着けながらも、ユーザー目線を忘れず制作・提案に取り組む人材を目指しています。
                </p>
            </div>
            <div class="l-skill">
                <h3 class="c-sub-title">skill</h3>
                <ul class="l-skill-icons">
                    <li class="p-skill-icon"><img src="image/html-icon.svg" alt="html"></li>
                    <li class="p-skill-icon"><img src="image/css-icon.svg" alt="css"></li>
                    <li class="p-skill-icon"><img src="image/js-icon.svg" alt="JavaScript"></li>
                    <li class="p-skill-icon"><img src="image/php-icon.svg" alt="php"></li>
                </ul>
            </div>
        </section>


        <section class="p-works" id="works">
            <div class="l-wrapper l-works-inner">
                <h2 class="c-section-title">Works</h2>



                <ul class="p-works__cards" id="work-card-area">
                    <!-- JSにて描画（作品の基本情報） -->

                </ul>
            </div>
            <dialog class="l-dialog c-dialog" id="dialog">
                <div id="dialog-write-area" class="c-dialog__js-area"><!-- JSにて描画(モーダル) --></div>
                <div class="c-dialog__icon-area">
                    <button class="before-btn c-arrow">←</button><button class="close" id="close"><span></span></button>
                    <button class="after-btn c-arrow">→</button>
                </div>
            </dialog>
        </section>



        <div class="p-msg-area">
            <p class="u-center-text p-msg-area__msg">Thank you for visiting！</p>
            <a class="p-top-btn u-center-text" href="#top">TOP
                <img src="image/flower-pink.png" alt="">
            </a>
        </div>


    </main>
    <footer class="l-footer u-center-text"><small>&copy;SAWA</small></footer>
</body>

<script src="js/script.js"></script>

</html>
